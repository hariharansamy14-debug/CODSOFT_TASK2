server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WHY THIS 'try_files' LINE MATTERS:
    # React Router handles routes like /dashboard or /login entirely in the
    # BROWSER (client-side routing). If a user refreshes the page while on
    # /dashboard, nginx would normally 404 because no such FILE exists on
    # disk. This line tells nginx: "if the exact file/folder isn't found,
    # just serve index.html instead" -- letting React Router take over and
    # render the right page client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies /api/* calls to the backend container, so the frontend can
    # simply call fetch('/api/...') without hardcoding a backend hostname.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
